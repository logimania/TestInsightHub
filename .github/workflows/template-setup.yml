name: テンプレート初期化

on:
  push:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 初期化が必要かチェック
        id: guard
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "commit_count=$COMMIT_COUNT"
          if [ "$COMMIT_COUNT" -ne 1 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "コミットが1つではないため、スキップします（count=$COMMIT_COUNT）"
          elif [ ! -f setup.js ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "setup.js が存在しないため、スキップします"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "初期化を実行します"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 20

      - name: セットアップスクリプトを実行
        if: steps.guard.outputs.skip != 'true'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_DESC="${{ github.event.repository.description }}"
          if [ -z "$REPO_DESC" ]; then
            REPO_DESC="Claude Code で構築されたプロジェクト"
          fi
          node setup.js "$REPO_NAME" "$REPO_DESC"

      - name: 変更をコミット＆プッシュ
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "プロジェクト初期化: ${{ github.event.repository.name }}" || echo "変更なし"
          git push
