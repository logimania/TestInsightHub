name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: CI実行が必要かチェック
        id: guard
        run: |
          if [ -f setup.js ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "未初期化テンプレートのため、CIをスキップします"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci

      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: npm run build

      - name: Test
        if: steps.guard.outputs.skip != 'true'
        run: npm run test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package
        run: npx electron-builder --${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-insight-hub-${{ matrix.target }}
          path: release/*
          retention-days: 7
